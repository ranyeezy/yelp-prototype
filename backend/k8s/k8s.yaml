---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-worker-service
  namespace: yelp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-worker-service
  template:
    metadata:
      labels:
        app: review-worker-service
    spec:
      containers:
        - name: review-worker-service
          image: backend-review-worker-service:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: yelp-config
                  key: KAFKA_BROKER
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: yelp-config
                  key: DATABASE_URL
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "kill -0 1"
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

