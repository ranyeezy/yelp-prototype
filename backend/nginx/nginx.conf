events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Auth routing — must come before generic /auth/ catch
        location ~ ^/auth/owners {
            proxy_pass http://owner-service:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location ~ ^/auth {
            proxy_pass http://user-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # User service
        location ~ ^/users {
            proxy_pass http://user-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location ~ ^/preferences {
            proxy_pass http://user-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location ~ ^/ai-assistant {
            proxy_pass http://user-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Restaurant service
        location ~ ^/restaurants {
            proxy_pass http://restaurant-service:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Review service
        location ~ ^/reviews {
            proxy_pass http://review-service:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location ~ ^/favorites {
            proxy_pass http://review-service:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Owner service
        location ~ ^/owners {
            proxy_pass http://owner-service:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static uploads — routed by filename prefix
        location ~ ^/uploads/owner_ {
            proxy_pass http://owner-service:8004;
            proxy_set_header Host $host;
        }
        location ~ ^/uploads/restaurant_ {
            proxy_pass http://restaurant-service:8002;
            proxy_set_header Host $host;
        }
        location ~ ^/uploads/review_ {
            proxy_pass http://review-service:8003;
            proxy_set_header Host $host;
        }
        location ~ ^/uploads/user_ {
            proxy_pass http://user-service:8001;
            proxy_set_header Host $host;
        }
    }
}
