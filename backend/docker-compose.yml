services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: yelp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - yelp-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: yelp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - yelp-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: yelp-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: yelp_prototype
    volumes:
      - mongodb_data:/data/db
    networks:
      - yelp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile.user
    container_name: user-service
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ./services/user-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile.restaurant
    container_name: restaurant-service
    ports:
      - "8002:8002"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/restaurant-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile.review
    container_name: review-service
    ports:
      - "8003:8003"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/review-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  owner-service:
    build:
      context: ./services/owner-service
      dockerfile: Dockerfile.owner
    container_name: owner-service
    ports:
      - "8004:8004"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/owner-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  review-worker-service:
    build:
      context: ./services/review-worker-service
      dockerfile: Dockerfile.review-worker
    container_name: review-worker-service
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      KAFKA_BROKER: kafka:9092
    networks:
      - yelp-network
    restart: on-failure

  restaurant-worker-service:
    build:
      context: ./services/restaurant-worker-service
      dockerfile: Dockerfile.restaurant-worker
    container_name: restaurant-worker-service
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/yelp_prototype
      KAFKA_BROKER: kafka:9092
    networks:
      - yelp-network
    restart: on-failure

  nginx:
    image: nginx:alpine
    container_name: yelp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - restaurant-service
      - review-service
      - owner-service
    networks:
      - yelp-network
    restart: on-failure

volumes:
  mongodb_data:

networks:
  yelp-network:
    driver: bridge
