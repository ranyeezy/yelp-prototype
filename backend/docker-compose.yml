services:
  mysql:
    image: mysql:8.0
    container_name: yelp-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: yelp_prototype
      MYSQL_USER: yelp_user
      MYSQL_PASSWORD: yelp_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - yelp-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -proot_password --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: yelp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - yelp-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: yelp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - yelp-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile.user
    container_name: user-service
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/user-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile.restaurant
    container_name: restaurant-service
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/restaurant-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  review-service:
    build:
      context: ./services/review-service
      dockerfile: Dockerfile.review
    container_name: review-service
    ports:
      - "8003:8003"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/review-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  owner-service:
    build:
      context: ./services/owner-service
      dockerfile: Dockerfile.owner
    container_name: owner-service
    ports:
      - "8004:8004"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
      JWT_SECRET: yelpsecretkey
      KAFKA_BROKER: kafka:9092
      SKIP_DB_INIT: "true"
    volumes:
      - ./services/owner-service/uploads:/app/uploads
    networks:
      - yelp-network
    restart: on-failure

  review-worker-service:
    build:
      context: ./services/review-worker-service
      dockerfile: Dockerfile.review-worker
    container_name: review-worker-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
    networks:
      - yelp-network
    restart: on-failure

  restaurant-worker-service:
    build:
      context: ./services/restaurant-worker-service
      dockerfile: Dockerfile.restaurant-worker
    container_name: restaurant-worker-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: mysql+pymysql://yelp_user:yelp_password@mysql:3306/yelp_prototype
    networks:
      - yelp-network
    restart: on-failure

volumes:
  mysql_data:

networks:
  yelp-network:
    driver: bridge
